<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e16"/>
      <stop offset="0.55" stop-color="#0d1320"/>
      <stop offset="1" stop-color="#0a0e16"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0.1" cy="0.9" r="0.5">
      <stop offset="0" stop-color="#d946ef" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#e879f9"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#161d2b"/>
    </pattern>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="node" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)" opacity="0.55"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect width="1280" height="640" fill="url(#glowBL)"/>

  <g transform="translate(80,46)">
    <rect x="0" y="2" width="30" height="38" rx="6" fill="#111826" stroke="#2b3445" stroke-width="2"/>
    <line x1="7" y1="13" x2="23" y2="13" stroke="#3a455a" stroke-width="2.5"/>
    <line x1="7" y1="21" x2="23" y2="21" stroke="#3a455a" stroke-width="2.5"/>
    <line x1="7" y1="29" x2="18" y2="29" stroke="#3a455a" stroke-width="2.5"/>
    <circle cx="34" cy="21" r="17" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
    <circle cx="34" cy="21" r="10" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.55"/>
    <circle cx="34" cy="21" r="3.5" fill="url(#accentV)"/>
  </g>
  <text x="142" y="78" font-size="33" font-weight="700" fill="#eef2f8" letter-spacing="-0.5">enquire<tspan fill="url(#accentV)">-mcp</tspan></text>
  <text x="1200" y="76" text-anchor="end" font-size="19" font-weight="600" fill="#7d8aa0" letter-spacing="0.3">The most advanced Obsidian MCP</text>
  <line x1="80" y1="116" x2="1200" y2="116" stroke="#1c2433" stroke-width="1.5"/>

  <text x="78" y="246" font-size="74" font-weight="800" fill="#f4f7fb" letter-spacing="-1.5">Long-term memory</text>
  <text x="78" y="330" font-size="74" font-weight="800" letter-spacing="-1.5" fill="#f4f7fb">for your <tspan fill="url(#accentV)">AI agents</tspan></text>

  <text x="80" y="388" font-size="25" font-weight="500" fill="#aab6c9">Grounded in the notes you actually wrote &#8212;<tspan fill="#cdd6e4" font-weight="600"> cited, auditable, editable.</tspan></text>

  <g font-size="19" font-weight="600">
    <g>
      <rect x="80" y="430" width="196" height="46" rx="23" fill="#121a28" stroke="#2a3446" stroke-width="1.5"/>
      <text x="178" y="459" text-anchor="middle" fill="#c6d0e0">Hybrid + reranked</text>
    </g>
    <g>
      <rect x="288" y="430" width="124" height="46" rx="23" fill="#121a28" stroke="#2a3446" stroke-width="1.5"/>
      <text x="350" y="459" text-anchor="middle" fill="#c6d0e0">GraphRAG</text>
    </g>
    <g>
      <rect x="424" y="430" width="150" height="46" rx="23" fill="#121a28" stroke="#2a3446" stroke-width="1.5"/>
      <text x="499" y="459" text-anchor="middle" fill="#c6d0e0">Agentic RAG</text>
    </g>
    <g>
      <rect x="586" y="430" width="138" height="46" rx="23" fill="#121a28" stroke="#2a3446" stroke-width="1.5"/>
      <text x="655" y="459" text-anchor="middle" fill="#c6d0e0">PDF + OCR</text>
    </g>
  </g>

  <g transform="translate(80,512)">
    <rect x="0" y="0" width="470" height="58" rx="12" fill="#0c121d" stroke="#283246" stroke-width="1.5"/>
    <rect x="0" y="0" width="4" height="58" rx="2" fill="url(#accent)"/>
    <text x="24" y="37" font-family="'SF Mono','JetBrains Mono','Fira Code',ui-monospace,Menlo,Consolas,monospace" font-size="21" fill="#e6edf3"><tspan fill="#8b5cf6">$</tspan> claude mcp add enquire-mcp</text>
  </g>

  <text x="80" y="606" font-size="17.5" font-weight="500" fill="#71809a">MIT  &#183;  SLSA L2 provenance  &#183;  Claude &#183; Cursor &#183; ChatGPT &#183; Codex &#183; OpenClaw</text>

  <!-- vault to knowledge-graph memory motif -->
  <g transform="translate(792,150)">
    <circle cx="232" cy="150" r="180" fill="url(#accent)" opacity="0.10" filter="url(#soft)"/>

    <g>
      <rect x="150" y="300" width="170" height="118" rx="12" fill="#0e1421" stroke="#283246" stroke-width="2" transform="rotate(-7 235 359)"/>
      <rect x="168" y="292" width="170" height="118" rx="12" fill="#11192a" stroke="#2f3a50" stroke-width="2" transform="rotate(-2 253 351)"/>
      <g transform="translate(186,286)">
        <rect x="0" y="0" width="170" height="118" rx="12" fill="#141d30" stroke="#3a4763" stroke-width="2"/>
        <text x="16" y="30" font-size="15" font-weight="700" fill="#8a97b0">## note.md</text>
        <line x1="16" y1="48" x2="150" y2="48" stroke="#2b3650" stroke-width="3"/>
        <line x1="16" y1="66" x2="150" y2="66" stroke="#2b3650" stroke-width="3"/>
        <line x1="16" y1="84" x2="118" y2="84" stroke="#2b3650" stroke-width="3"/>
        <line x1="16" y1="102" x2="138" y2="102" stroke="#2b3650" stroke-width="3"/>
      </g>
    </g>

    <path d="M268,286 C268,235 268,205 268,178" fill="none" stroke="url(#accent)" stroke-width="3" stroke-dasharray="2 7" stroke-linecap="round" opacity="0.85" marker-end="url(#ah)"/>

    <g stroke="url(#accent)" stroke-width="2.5" opacity="0.65" fill="none">
      <line x1="120" y1="92" x2="232" y2="48"/>
      <line x1="232" y1="48" x2="350" y2="86"/>
      <line x1="120" y1="92" x2="180" y2="160"/>
      <line x1="180" y1="160" x2="232" y2="48"/>
      <line x1="350" y1="86" x2="318" y2="158"/>
      <line x1="180" y1="160" x2="318" y2="158"/>
      <line x1="232" y1="48" x2="318" y2="158"/>
    </g>
    <g>
      <circle cx="232" cy="48" r="20" fill="url(#accentV)" opacity="0.25" filter="url(#node)"/>
      <circle cx="232" cy="48" r="13" fill="#0a0e16" stroke="url(#accent)" stroke-width="3"/>
      <circle cx="232" cy="48" r="5" fill="url(#accentV)"/>
      <circle cx="120" cy="92" r="10" fill="#0a0e16" stroke="url(#accent)" stroke-width="3"/>
      <circle cx="350" cy="86" r="10" fill="#0a0e16" stroke="url(#accent)" stroke-width="3"/>
      <circle cx="180" cy="160" r="9" fill="#0a0e16" stroke="url(#accent)" stroke-width="3"/>
      <circle cx="318" cy="158" r="11" fill="#0a0e16" stroke="url(#accent)" stroke-width="3"/>
    </g>
  </g>

  <rect x="0" y="632" width="1280" height="8" fill="url(#accent)"/>
</svg>
